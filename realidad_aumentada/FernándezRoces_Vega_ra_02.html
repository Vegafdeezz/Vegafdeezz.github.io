<!DOCTYPE html>
<html lang="es">
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RA 02 - Primera escena con marcador</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .pagina {
      max-width: 900px;
      margin: 0 auto;
    }

    .caja-ra {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 420px;
      margin: 0 auto;
      border: 2px solid #444;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .caja-ra a-scene {
      position: absolute !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .a-canvas {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 2 !important;
    }

    #arjs-video {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 1 !important;
    }

    .a-enter-vr,
    .a-orientation-modal,
    .a-fullscreen-ui {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="pagina">
    <div class="caja-ra" id="contenedor-ra">

  <a-scene>

    <!-- Fondo -->
    <a-sky color="#222"></a-sky>

    <!-- Suelo -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="6"
      height="6"
      color="#555">
    </a-plane>

    <!-- Contenedor del objeto -->
    <a-entity id="modelo" position="0 0 -4">

      <!-- Base -->
      <a-box
        position="0 0.6 0"
        width="1.3"
        height="1.3"
        color="#ccc">
      </a-box>

      <!-- Tejado -->
      <a-cone
        position="0 1.7 0"
        radius-bottom="0.65"
        height="0.9"
        color="red">
      </a-cone>

      <!-- Puerta -->
      <a-box
        position="0 0.5 0.1"
        width="0.6"
        height="1"
        color="green">
      </a-box>

    </a-entity>

    <!-- Cámara -->
    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>
 </div>
  </div>

  <script>
    window.addEventListener("load", () => {
      const contenedor = document.getElementById("contenedor-ra");

      const recolocarElementosAR = () => {
        const video = document.getElementById("arjs-video");
        const canvas = document.querySelector(".a-canvas");

        if (video && video.parentElement !== contenedor) {
          contenedor.appendChild(video);
        }

        if (canvas && canvas.parentElement !== contenedor) {
          contenedor.appendChild(canvas);
        }
      };

      setTimeout(recolocarElementosAR, 1000);
      setTimeout(recolocarElementosAR, 2000);
      setTimeout(recolocarElementosAR, 3000);
    });
  </script>
</body>
</html>
