<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba 3D</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

  <a-scene>

    <!-- Fondo -->
    <a-sky color="#222"></a-sky>

    <!-- Suelo -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="6"
      height="6"
      color="#555">
    </a-plane>

    <!-- Contenedor del objeto -->
    <a-entity id="modelo" position="0 0 -4">

      <!-- Base -->
      <a-box
        position="0 0.6 0"
        width="1.3"
        height="1.3"
        color="#ccc">
      </a-box>

      <!-- Tejado -->
      <a-cone
        position="0 1.7 0"
        radius-bottom="0.65"
        height="0.9"
        color="red">
      </a-cone>

      <!-- Puerta -->
      <a-box
        position="0 0.5 0.1"
        width="0.6"
        height="1"
        color="green">
      </a-box>

    </a-entity>

    <!-- Cámara -->
    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>

</body>
</html>
